name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Index on Go proxy
        run: GOPROXY=proxy.golang.org go list -m github.com/us/den@${{ github.ref_name }}

  publish-sdk-ts:
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - working-directory: sdk/typescript
        run: |
          bun install
          bun run build
      - uses: JS-DevTools/npm-publish@v3
        if: env.NPM_TOKEN != ''
        with:
          token: ${{ secrets.NPM_TOKEN }}
          package: sdk/typescript
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-sdk-py:
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - working-directory: sdk/python
        run: uv build
      - name: Publish to PyPI
        if: env.PYPI_TOKEN != ''
        working-directory: sdk/python
        run: uv publish --token "$PYPI_TOKEN"
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push default image
        uses: docker/build-push-action@v6
        with:
          context: images/default
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/default:latest
            ghcr.io/${{ github.repository }}/default:${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64
